# zcrud_list — membre du workspace zcrud (resolution: workspace).
# E4-1 : `zcrud_list` devient un package FLUTTER et acquiert la SEULE arête vers
# Syncfusion du graphe (`syncfusion_flutter_datagrid`). C'est le backend concret
# `ZSfDataGridRenderer` du port neutre `ZListRenderer` (défini dans zcrud_core).
# AD-8/SM-5 : Syncfusion vit EXCLUSIVEMENT ici ; un consommateur qui n'importe
# pas zcrud_list (ex. zcrud_markdown) ne tire AUCUNE dépendance Syncfusion.
# AD-1 : arête sortante zcrud_* = zcrud_core UNIQUEMENT (graphe acyclique).
# AUCUNE clé/licence Syncfusion committée : l'enregistrement de licence est une
# config plateforme de l'app hôte (Key Don'ts « never de secret dans un package »).
name: zcrud_list
description: "DynamicList data-grid for zcrud powered by Syncfusion, isolated behind the neutral ZListRenderer port."
version: 0.4.3
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_list
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - datagrid
  - table
  - crud
  - syncfusion

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique) : zcrud_core UNIQUEMENT.
# Siblings du workspace résolus par contrainte de version (pas de path:).
dependencies:
  flutter:
    sdk: flutter
  # Stack de l'architecture (^34.1.x) — SEULE arête Syncfusion du graphe (AD-8).
  # Bump coordonné 32→34 (le `syncfusion_flutter_core` partagé impose de bouger
  # tout le stack ensemble : pdf/xlsio/datagrid) pour débloquer `printing ^5.15.0`.
  syncfusion_flutter_datagrid: ^34.1.31
  zcrud_core: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter

# Syncfusion (`SfDataGrid`) utilise les icônes Material : requis pour un rendu
# correct côté app hôte (silence le warning de résolution `uses-material-design`).
flutter:
  uses-material-design: true
