# zcrud_mindmap — membre du workspace zcrud (resolution: workspace).
# Squelette minimal (E1-1) : la résolution passe ; l'API/barrel et les
# dépendances inter-packages sont posées en E1-2.
name: zcrud_mindmap
description: "Mind maps for zcrud: immutable ZMindmap/ZMindmapNode tree with ZMindmapTreeOps, a graphite auto-layout view plus an accessible list surface, and an outline editor."
version: 0.11.0
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_mindmap
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - mindmap
  - tree
  - outline
  - forms

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique — E1-2).
# Siblings du workspace résolus par contrainte de version (pas de path:).
# AD-1 : composition mindmap -> markdown (rich-text) + cœur.
dependencies:
  flutter:
    sdk: flutter
  zcrud_core: ^0.11.0
  zcrud_markdown: ^0.11.0
  graphite: ^1.2.1

# E10-2 : le package devient PORTEUR D'UI (vue `ZMindmapView`) : il tire le SDK
# Flutter et l'arête AD-1 AUTORISÉE `zcrud_mindmap -> graphite` (auto-layout de
# graphe, superséde `graphview`). AUCUNE arête vers un gestionnaire d'état /
# Firebase / Syncfusion (AD-1/AD-2/AD-15).
dev_dependencies:
  flutter_test:
    sdk: flutter
