# zcrud_field_extras — satellite CHAMPS SPÉCIALISÉS (fp-1-2, AD-53) — membre du
# workspace zcrud (resolution: workspace). SQUELETTE de substrat : coquille
# conforme, gardée et résolue offline AVANT l'écriture des adaptateurs (Finitions).
#
# AD-53 : accueillera les champs PIN / autocomplete / table éditable / icon,
# servis par `ZWidgetRegistry` (câblage cœur existant). Les dépendances légères
# (`pinput`/…) arrivent aux Finitions, CONFINÉES à l'impl — AUCUNE ajoutée ici.
#
# AD-1 : arêtes inter-packages zcrud_* SORTANTES = `zcrud_core` UNIQUEMENT
# (graphe acyclique, CORE OUT=0). `flutter` (SDK) n'ajoute aucune arête au
# graph_proof. AD-12 : ZÉRO clé/secret committé.
name: zcrud_field_extras
description: "Specialized field satellite for zcrud (AD-53): PIN/autocomplete/editable-table/icon served by ZWidgetRegistry, light deps confined to impl. Skeleton substrate — depends only on zcrud_core."
version: 0.4.6
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_field_extras
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - flutter
  - form
  - fields
  - widgets

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique) : UNIQUEMENT zcrud_core.
# ⛔ AUCUN autre `zcrud_*`. Deps lourdes CONFINÉES à l'impl (fp-5-2) :
#   - `pinput` (widget PIN/OTP segmenté) — SEULE dép lourde ajoutée.
#   - autocomplétion (`Autocomplete` natif Flutter) + table éditable = SDK-only,
#     AUCUNE dépendance (l'étude REJETTE `autocomplete_textfield`/`editable`).
#   - ⛔ `flutter_tags`/`drag_and_drop_lists` NON ajoutés (rejetés par l'étude ;
#     « tags riches » non dispatcher-atteignable en satellite pur — SIGNAL cœur).
# Ces deps NON `zcrud_*` n'ajoutent aucune arête au graph_proof (CORE OUT=0).
dependencies:
  zcrud_core: ^0.4.6
  flutter:
    sdk: flutter
  pinput: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
