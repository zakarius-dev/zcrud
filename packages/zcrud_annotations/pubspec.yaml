# zcrud_annotations — membre du workspace zcrud (resolution: workspace).
# Squelette minimal (E1-1) : la résolution passe ; l'API/barrel et les
# dépendances inter-packages sont posées en E1-2.
name: zcrud_annotations
description: "Annotations for the zcrud code generator: @ZcrudModel, @ZcrudField and @ZcrudId. Declare a model once, generate everything."
version: 0.4.0
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_annotations
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - annotations
  - code-generation
  - crud
  - serialization

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique — E1-2).
# Siblings du workspace résolus par contrainte de version (pas de path:).
dependencies:
  zcrud_core: ^0.4.0

# Tests pur-Dart (E2-4) : `package:test` seul. AUCUNE dépendance runtime lourde
# (ni build_runner/source_gen/analyzer, ni gestionnaire d'état, ni Firebase,
# ni Flutter direct) — cf. AC1. Les annotations n'importent que la surface
# PURE `package:zcrud_core/edition.dart` (aucune fuite du SDK Flutter tiré par
# la couche presentation du cœur) ⇒ ces tests tournent sous `dart test`.
dev_dependencies:
  test: ^1.25.0
