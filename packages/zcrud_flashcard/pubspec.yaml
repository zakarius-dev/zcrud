# zcrud_flashcard — membre du workspace zcrud (resolution: workspace).
# Squelette minimal (E1-1) : la résolution passe ; l'API/barrel et les
# dépendances inter-packages sont posées en E1-2.
name: zcrud_flashcard
description: "Spaced-repetition flashcards for zcrud: ZFlashcard/ZChoice models, a pluggable SuperMemo-2 scheduler, study folders/sessions and an offline-first repository."
version: 0.3.5
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_flashcard
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - flashcards
  - spaced-repetition
  - srs
  - forms

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique — E1-2).
# Siblings du workspace résolus par contrainte de version (pas de path:).
# AD-1 : composition flashcard -> study_kernel + markdown + export + cœur.
# ES-1.1 : arête flashcard -> study_kernel (dossier d'étude + config de session
# remontés dans le noyau bas-niveau ; acyclique `flashcard -> study_kernel ->
# core`, prouvé par graph_proof.py).
# E9-1 : arête flashcard -> annotations (annotations `const` @ZcrudModel/
# @ZcrudField/@ZcrudId référencées dans lib/ — pur-Dart, léger, acyclique).
dependencies:
  # Le domaine flashcard tire transitivement le SDK Flutter via le barrel
  # `package:zcrud_core/zcrud_core.dart` (mêmes 4 APIs pur-Dart exportées côté
  # Flutter — cf. follow-up LOW-1). `zcrud_flashcard` est donc un package Flutter
  # au même titre que `zcrud_mindmap` : on le DÉCLARE explicitement pour que la
  # CI (gate `verify:serialization`) aiguille sur `flutter test` et non `dart
  # test` (ce dernier ne compile pas les tests important `flutter_test`).
  flutter:
    sdk: flutter
  zcrud_core: ^0.3.5
  zcrud_study_kernel: ^0.3.5
  zcrud_markdown: ^0.3.5
  zcrud_export: ^0.3.5
  zcrud_annotations: ^0.3.5

# E9-1 : toolchain codegen CONFINÉE en dev (AD-1/AD-3) — le builder `zcrud_model`
# (`auto_apply: dependents`) émet `flashcard.g.dart`/`z_choice.g.dart`
# (gitignorés, régénérés). Tests via `flutter test` (le cœur tire le SDK Flutter
# via `zcrud_core.dart`, réutilisé par le domaine flashcard — même convention que
# `zcrud_mindmap`). Aucune dépendance runtime lourde ajoutée.
dev_dependencies:
  zcrud_generator: ^0.3.5
  build_runner: ^2.5.0
  flutter_test:
    sdk: flutter
