# zcrud_generator — builder build_runner du moteur codegen (AD-3).
#
# **dev_dependency** des packages consommateurs (jamais une dépendance runtime :
# ses deps lourdes `analyzer`/`build`/`source_gen` restent CONFINÉES ici, AD-1 —
# elles ne fuient pas dans `zcrud_core` ni chez les consommateurs). Lit
# STATIQUEMENT les annotations `@ZcrudModel`/`@ZcrudField`/`@ZcrudId` (E2-4) via
# `ConstantReader`/`TypeChecker` (JAMAIS `reflectable`, JAMAIS d'exécution) et
# émet `toMap`/`fromMap`/`copyWith` + `ZFieldSpec[]` + `register(ZcrudRegistry)`.
name: zcrud_generator
description: "build_runner code generator for zcrud: (de)serialization, ZFieldSpec[] and registry from @ZcrudModel-annotated models."
version: 0.4.2
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_generator
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - code-generation
  - build-runner
  - serialization
  - crud

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique — E1-2).
# Siblings du workspace résolus par contrainte de version (pas de path:).
# AD-1 : builder -> annotations (source des specs) + cœur (types `ZFieldSpec`/
# `ZcrudRegistry` référencés par le code émis).
# Toolchain codegen (autorisée ICI SEULEMENT — AD-1) : analyzer/build/source_gen.
dependencies:
  zcrud_core: ^0.4.2
  zcrud_annotations: ^0.4.2
  # architecture.md cible analyzer ^7 ; la résolution PARTAGÉE du workspace
  # (flutter_test/test → analyzer >=8) impose ^8 ici. Variance assumée et
  # documentée (Dev Notes) : contrainte de résolution unique, pas un choix libre.
  analyzer: ^12.0.0
  build: ^4.0.0
  source_gen: ^4.0.0

dev_dependencies:
  build_runner: ^2.15.0
  build_test: ^3.5.0
  test: ^1.25.0
