# zcrud_get — binding état/injection <-> GetX + get_it (E2-9, AD-15).
#
# INFLEXION E2-9 : la coquille pur-Dart (E1-2) acquiert le SDK Flutter + le SDK du
# manager (`get` + `get_it`) pour porter la substance du binding DODLP (cible E7) :
# `ZGetResolver` (résolution des seams via le locator) + `ZcrudGetScope`
# (création/scoping/dispose du `ZFormController` selon le lifecycle GetX/get_it,
# puis enveloppe d'un `ZcrudScope` porteur du resolver manager-backed).
#
# INVARIANTS (AD-1/AD-15) : deps `zcrud_*` = `zcrud_core` + `zcrud_study_kernel`
# + `zcrud_navigation` + `zcrud_ui_kit` (les 2 dernières AJOUTÉES en EX-UI.11 :
# arêtes SORTANTES du binding-PUITS vers les paquets UI purs, pour y implémenter
# les ports `ZFormPresenter`/`ZToaster` en idiome GetX ; `zcrud_responsive` est
# tiré TRANSITIVEMENT via `zcrud_navigation`). Toutes ces arêtes sont SORTANTES
# (jamais entrantes au cœur) ⇒ CORE OUT=0 intact, graphe ACYCLIQUE (un puits ne
# crée aucun cycle) ; AUCUNE entité concrète (R28 —
# document/note/exam/session/flashcard/mindmap/study) ; `get`/`get_it`/
# `reflectable` restent les seuls idiomes/exception manager — `get` reste
# l'UNIQUE idiome manager, exclusif à ce binding (AD-15) ; AUCUN backend lourd
# (Firebase/Syncfusion/Quill/Maps/Hive). Le code manager-spécifique (get/get_it)
# vit EXCLUSIVEMENT ici (AD-6/AD-15) ; `zcrud_core`/`zcrud_study_kernel`/
# `zcrud_navigation`/`zcrud_ui_kit` restent STRICTEMENT inchangés. CORE OUT=0
# préservé (`get`/`get_it`/`reflectable`/`flutter` ne sont PAS des `zcrud_*` →
# non comptés par graph_proof).
name: zcrud_get
description: "GetX and get_it state and injection binding for zcrud (optional). Targets the DODLP host app."
version: 0.4.5
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_get
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - getx
  - state-management
  - crud
  - forms

environment:
  sdk: ^3.12.2

# Runtime : SDK Flutter + le cœur + le SDK du manager. `get`/`get_it` NE sont PAS
# des `zcrud_*` → aucune arête comptée par graph_proof.py (CORE OUT=0 préservé).
dependencies:
  zcrud_core: ^0.4.5
  # Fan-in ES-11.1 (AD-24/R28) : SEULE nouvelle arête `zcrud_*`. Fournit le port
  # générique `ZStudyRepository<T>`, la primitive PURE `ZStudySessionSelector` et
  # la forme persistable `ZStudySessionConfig`. AUCUNE entité concrète tirée.
  zcrud_study_kernel: ^0.4.5
  # EX-UI.11 (AD-30/AD-32/AD-4) : 2 arêtes UI SORTANTES ajoutées pour implémenter
  # les ports `ZFormPresenter` (navigation) et `ZToaster` (ui_kit) en idiome GetX,
  # substituables aux défauts pur-Flutter via leurs seams (`ZFormPresenterScope`/
  # `ZToasterScope`). `zcrud_navigation` tire `zcrud_responsive` TRANSITIVEMENT.
  # Sens SORTANT (binding-puits → paquets purs) ⇒ CORE OUT=0 intact, ACYCLIQUE.
  zcrud_navigation: ^0.4.5
  zcrud_ui_kit: ^0.4.5
  # fp-2-2 (AD-55/AD-1) : 3 arêtes SORTANTES du binding-PUITS vers les satellites
  # de champs MVP, pour que le composeur unique `registerZcrudFormFields` APPELLE
  # leurs registrars/builders (markdown = voie rich-text par défaut ; intl =
  # phoneNumber/country/address ; geo = location). Sens SORTANT (binding → satellites)
  # ⇒ CORE OUT=0 intact (le cœur ne gagne rien), graphe ACYCLIQUE (un puits ne crée
  # aucun cycle). Les satellites NON-MVP (html/media/select/field_extras) NE sont PAS
  # ajoutés : ils entrent via le seam opt-in `additionalRegistrars` au site d'appel.
  zcrud_markdown: ^0.4.5
  zcrud_intl: ^0.4.5
  zcrud_geo: ^0.4.5
  flutter:
    sdk: flutter
  get: ^4.7.2
  get_it: ^9.0.0
  # E2-6 (FR-11/AD-3) : `reflectable` — adaptateur `ReflectableCodec` DODLP, au
  # chemin allowlisté du gate. Ajouté à `zcrud_get` UNIQUEMENT (jamais au cœur).
  # N'est PAS un `zcrud_*` → aucune arête comptée par graph_proof (CORE OUT=0
  # inchangé). Le vrai `initializeReflectable()` vit dans l'app DODLP (E7-2).
  reflectable: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Harnais de parité dev/test-only partagé (E2-9). dev_dependency => non
  # transitif pour les apps hôtes ; résolu comme sibling du workspace par version.
  binding_conformance: ^0.0.1
