# zcrud_study — membre du workspace zcrud (resolution: workspace).
# Package de PRÉSENTATION de l'orchestration « study tools » (AD-25). ES-5.1 pose
# le SOCLE : le descripteur de section paramétrique `ZStudyToolsSectionSpec`
# (title/itemBuilder/emptyState/addAction) + l'échafaudage de composition
# `ZSectionedStudyLayout` (liste de sections INDÉPENDANTES, une frontière de
# widget/Key par section) + le harnais golden DISCRIMINANT qui PROUVE que le
# monolithe IFFD `folder_study_tools_page.dart` (~1753 l.) se décompose sans
# perte d'apparence. Le branchement données réel + scoping ValueListenable par
# champ = ES-5.2 ; les sections réordonnables = ES-5.3.
name: zcrud_study
description: "Study-tools orchestration (presentation) for zcrud: parametric section descriptor (ZStudyToolsSectionSpec) and a decomposed sectioned layout (ZSectionedStudyLayout) proven by a discriminant golden harness."
version: 0.4.3
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_study
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - study
  - presentation
  - crud
  - forms

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1/AD-17, graphe ACYCLIQUE, CORE OUT=0).
# Siblings du workspace résolus par contrainte de version (pas de path:).
#
# - `flutter`            : package de PRÉSENTATION (widgets `ZSectionedStudyLayout`),
#                          aiguille la CI sur `flutter test` (R14) — les tests
#                          golden tirent `flutter_test`/`dart:ui`.
# - `zcrud_core`         : surface présentation `package:zcrud_core/zcrud_core.dart`
#                          (`ZcrudScope`, `ZcrudTheme`) — injection thème/seams
#                          Flutter-native (AD-2/AD-6/AD-15). JAMAIS l'inverse.
# - `zcrud_study_kernel` : arête DÉCLARÉE d'emblée (AD-17 : les satellites study
#                          dépendent du kernel). Consommée par les stories
#                          suivantes du MÊME package (ES-5.3 : `ZFolderContentsOrder`/
#                          `applyOrder<T>`). Aucun cycle (kernel → core uniquement).
# - `zcrud_annotations`  : annotations `const` du codegen (arête study → annotations
#                          hérité de la convention des packages study).
#
# - `zcrud_mindmap`      : arête AJOUTÉE par ES-7.1 (première story qui la consomme
#                          réellement). `ZStudyMindmapSection` COMPOSE la surface
#                          publique déjà livrée (`ZMindmapView` E10-2 ;
#                          `ZMindmapOutlineController`/`ZMindmapOutlineEditor` E10-3)
#                          — section « carte mentale » de la page study-tools
#                          (AD-25/AD-4/AD-28). Arête ACYCLIQUE (mindmap → core/…,
#                          jamais l'inverse). ⛔ `graphite` reste TRANSITIF via
#                          `zcrud_mindmap` — PAS de `graphite`/`flutter_flow_chart`/
#                          `graphview` en dépendance directe de `zcrud_study`
#                          (flowchart legacy IFFD NON porté, AD-1).
#
# - `zcrud_flashcard`    : arête AJOUTÉE par ES-9.1 (première story qui la consomme
#                          réellement). Les seams IA neutres du domaine ES-9.1
#                          renvoient `List<ZFlashcard>` (`ZFlashcardGenerationPort`)
#                          et portent la provenance de carte via
#                          `ZFlashcardSource` + le registre pluggable
#                          `ZSourceRegistry` (AD-4). ES-9.1 RÉUTILISE ces types
#                          existants (aucun modèle de provenance recréé). Arête
#                          ACYCLIQUE : `zcrud_flashcard → core/kernel/annotations/
#                          generator`, JAMAIS l'inverse (`zcrud_flashcard` ne
#                          dépend PAS de `zcrud_study`). CORE OUT=0 préservé.
#
# - `zcrud_exam`         : arête AJOUTÉE par ES-9.2 (première story qui la consomme
#                          réellement) — consommé pour `ZExam`/`ZReminderTime`/
#                          `kReminderTimeKey` : UI examens (`ZExamEditor`) + section
#                          rappels (`ZExamRemindersSection`) + adaptateur
#                          `ZApproachingExam` (`z_exam_reminders.dart`) câblant les
#                          examens réels à `aggregateDailyStudyTasks` (kernel). Le
#                          câblage `ZExam → ZApproachingExam` est un ADAPTATEUR côté
#                          `zcrud_study` (0 arête sur `zcrud_exam`, l'arête kernel
#                          étant explicitement DIFFÉRÉE par le pubspec `zcrud_exam`).
#                          Arête ACYCLIQUE : `zcrud_exam → core/annotations`
#                          SEULEMENT, JAMAIS l'inverse (`zcrud_exam` ne dépend PAS de
#                          `zcrud_study`) ⇒ aucun cycle. `zcrud_exam` reste PUR-DART
#                          (aucun `sdk: flutter` ajouté à SON pubspec, `gate:web`
#                          intact — l'UI vit ICI, précédent `ZTagEditor`/
#                          `ZStudyMindmapSection`). CORE OUT=0 préservé.
#
# - `zcrud_responsive`  : arête AJOUTÉE par SU-8 (première story qui la consomme
#                          réellement) — consommée pour `ZAdaptiveGrid.builder` :
#                          la grille responsive VIRTUALISÉE de `ZFlashcardListView`
#                          (FR-SU14/NFR-SU9). L'AC exige « responsive via
#                          `ZAdaptiveGrid`, jamais une grille réécrite » : sans
#                          cette arête, `zcrud_study` devrait REDÉCLARER une grille
#                          — la « seconde source » que ce projet combat.
#                          Arête ACYCLIQUE : `zcrud_responsive → [zcrud_core]`
#                          SEULEMENT (out-degree 1), JAMAIS l'inverse
#                          (`zcrud_responsive` ne dépend PAS de `zcrud_study`) ⇒
#                          aucun cycle. CORE OUT=0 préservé. ZÉRO dépendance
#                          tierce nouvelle (`zcrud_responsive` est un package
#                          zcrud ⇒ `z_third_party_confinement_test` sans objet).
#                          Graphe : 53 → 54 arêtes.
#
# ⛔ AUCUN gestionnaire d'état (`flutter_riverpod`/`get`/`provider`), AUCUN autre
#    satellite lourd (`zcrud_note`/`zcrud_document`), AUCUN SDK IA / client HTTP
#    (`http`/`dio`/`openai`/`google_generative_ai`/`firebase_ai`) — les impls IA
#    (routeur, prompts, `toWireJson`, SSE, clés) restent CÔTÉ APP (AD-11/AD-12).
#    Ces arêtes seront ajoutées par la story qui les consomme réellement.
#
# - `zcrud_ui_kit`      : arête AJOUTÉE par ME-2 (première story qui la consomme
#                          réellement) — consommée pour `ZDiscardChangesGuard` :
#                          le garde anti-perte de saisie EXISTANT (EX-UI.9) qui
#                          intercepte la sortie tant que le brouillon du
#                          multi-éditeur diverge de son snapshot. L'AC exige
#                          « jamais une garde réécrite » : sans cette arête,
#                          `zcrud_study` devrait REDÉCLARER un `PopScope`+dialog —
#                          la « seconde source » que ce projet combat.
#                          Arête ACYCLIQUE : `zcrud_ui_kit → [zcrud_core]`
#                          SEULEMENT (out-degree 1), JAMAIS l'inverse
#                          (`zcrud_ui_kit` ne dépend PAS de `zcrud_study` ni de
#                          `zcrud_flashcard`) ⇒ aucun cycle. CORE OUT=0 préservé.
#                          ZÉRO dépendance tierce nouvelle (`zcrud_ui_kit` ne tire
#                          que `zcrud_core` + SDK Flutter). Patron identique à
#                          l'arête `zcrud_responsive` ajoutée par SU-8.
dependencies:
  flutter:
    sdk: flutter
  zcrud_core: ^0.4.3
  zcrud_study_kernel: ^0.4.3
  zcrud_annotations: ^0.4.3
  zcrud_mindmap: ^0.4.3
  zcrud_flashcard: ^0.4.3
  zcrud_exam: ^0.4.3
  zcrud_responsive: ^0.4.3
  zcrud_ui_kit: ^0.4.3

# Package Flutter → tests golden via `flutter test` (R14). Aucun codegen
# (aucun `@ZcrudModel` : pas de `*.g.dart`, gate `codegen-distribution` sans objet).
dev_dependencies:
  flutter_test:
    sdk: flutter
