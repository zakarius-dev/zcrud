# zcrud_geo — membre du workspace zcrud (resolution: workspace).
# E11a-1 : `zcrud_geo` devient un package FLUTTER (champ géo `location`/`geoArea`
# servi via `ZWidgetRegistry`, patron AD-2) et acquiert la SEULE arête vers un
# SDK carte du graphe : `flutter_map` (OSM, SANS clé API — AD-12) + `latlong2`.
# AD-1/AD-12 : ces libs vivent EXCLUSIVEMENT ici (jamais dans `zcrud_core`) et
# sont CONFINÉES à l'entrée adaptateur concret (`lib/adapters/osm.dart` →
# `src/presentation/adapters/z_osm_map_adapter.dart`). Aucun type carte
# (`LatLng`/`MapController`) ne fuit ni dans `zcrud_core`, ni dans la valeur de
# tranche, ni dans l'API publique du barrel principal. ZÉRO clé/secret.
# AD-1 : arête sortante zcrud_* = zcrud_core UNIQUEMENT (graphe acyclique).
name: zcrud_geo
description: "Geo fields for zcrud: neutral location/geoArea model with an optional OpenStreetMap map adapter."
version: 0.3.2
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_geo
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - geolocation
  - maps
  - openstreetmap
  - forms

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique) : zcrud_core UNIQUEMENT.
# Siblings du workspace résolus par contrainte de version (pas de path:).
dependencies:
  flutter:
    sdk: flutter
  # SDK carte OSM (sans clé API → alignement AD-12) — arête carte du graphe
  # (AD-1). Confiné à `src/presentation/adapters/` + entrée `lib/adapters/osm.dart`.
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  # 2e adaptateur carte (E11b-1) : Google Maps. La clé API vit dans la CONFIG
  # PLATEFORME de l'app hôte (manifest Android `com.google.android.geo.API_KEY` /
  # `AppDelegate` iOS — E1-5), JAMAIS dans ce package (AD-12). SDK confiné à
  # `src/presentation/adapters/z_google_map_adapter.dart` + entrée
  # `lib/adapters/google.dart` ; jamais exporté par le barrel principal, jamais
  # tiré dans `zcrud_core` (CORE OUT=0).
  google_maps_flutter: ^2.9.0
  zcrud_core: ^0.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
