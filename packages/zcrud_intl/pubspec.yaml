# zcrud_intl — membre du workspace zcrud (resolution: workspace).
# E11a-2 : `zcrud_intl` devient un package FLUTTER (champs téléphone/pays/adresse
# servis via `ZWidgetRegistry`, patron AD-2) et acquiert la SEULE arête vers une
# lib téléphone du graphe : `phone_numbers_parser` (pur-Dart, métadonnées
# bundlées, SANS clé API ni réseau — AD-12).
# AD-1/AD-12 : cette lib vit EXCLUSIVEMENT ici (jamais dans `zcrud_core`) et est
# CONFINÉE à l'unique pont `src/presentation/z_phone_codec.dart`. Aucun type lib
# (`PhoneNumber`/`IsoCode`) ne fuit ni dans `zcrud_core`, ni dans la valeur de
# tranche, ni dans l'API publique du barrel. Le catalogue pays est un asset JSON
# bundlé (`lib/assets/countries.json`), chargé paresseusement. ZÉRO clé/secret.
# AD-1 : arête sortante zcrud_* = zcrud_core UNIQUEMENT (graphe acyclique).
name: zcrud_intl
description: "International fields for zcrud: phone, country and address with bundled, offline metadata and neutral values."
version: 0.12.0
publish_to: none
resolution: workspace

homepage: https://github.com/zakarius-dev/zcrud
repository: https://github.com/zakarius-dev/zcrud/tree/main/packages/zcrud_intl
issue_tracker: https://github.com/zakarius-dev/zcrud/issues
topics:
  - internationalization
  - phone
  - country
  - forms

environment:
  sdk: ^3.12.2

# Arêtes inter-packages zcrud_* (AD-1, graphe acyclique) : zcrud_core UNIQUEMENT.
# Siblings du workspace résolus par contrainte de version (pas de path:).
dependencies:
  flutter:
    sdk: flutter
  # Lib téléphone pur-Dart (parse/valide/formate E.164), métadonnées bundlées,
  # SANS clé API ni réseau (AD-12). SEULE arête téléphone du graphe (AD-1),
  # confinée à `src/presentation/z_phone_codec.dart`.
  phone_numbers_parser: ^9.0.23
  zcrud_core: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Catalogues bundlés (FR-21) — chargés paresseusement via rootBundle, offline,
  # SANS clé/secret/réseau (AD-12). Devise = ISO 4217 ; subdivisions = ISO 3166-2
  # (sous-ensemble curaté indexé par pays, injectable/extensible).
  assets:
    - lib/assets/countries.json
    - lib/assets/currencies.json
    - lib/assets/subdivisions.json
