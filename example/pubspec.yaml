# Application exemple STANDALONE de zcrud (EX-1) — banc de démonstration et de
# validation exécutable du cœur (SM-1, AD-2/AD-15) et harnais croissant (E4/E5/
# E6/E11a viendront en EX-2/EX-3).
#
# ISOLATION (NON-NÉGOCIABLE — cf. story EX-1 §Décision structurante) — calquée
# sur `tool/compat_check` :
#   - ABSENTE du bloc `workspace:` du root `pubspec.yaml` (lock PROPRE ci-contre :
#     `example/pubspec.lock`) → n'altère JAMAIS le lock partagé des 14 membres ;
#   - HORS du glob melos `packages/**` → `melos list` reste 14 (invariant produit) ;
#   - HORS du scope de `scripts/dev/graph_proof.py` (qui n'itère que `packages/*`) ;
#   - PAS de `resolution: workspace` ICI (app isolée, résolution locale).
# Les `dependency_overrides` pointent chaque `zcrud_*` consommé vers son `path:`
# (les bindings épinglent `zcrud_core: ^0.0.1` HOSTED : l'override réconcilie la
# source path↔hosted sans rejoindre le workspace). CONSOMMATEUR only : ne modifie
# AUCUN package sous `packages/`. `zcrud_core` reste Syncfusion/Firebase/Maps-free
# (SM-5) ; l'app a le droit de tout consommer (elle n'est pas un package produit).
name: zcrud_example
description: Application exemple STANDALONE de démonstration/validation de zcrud (EX-1).
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Cœur + les 3 bindings (parité AD-15) + `zcrud_list` (démo LISTE EX-2 : tire
  # transitivement `syncfusion_flutter_datagrid`, SM-5 — l'APP tire Syncfusion,
  # jamais `zcrud_core`). Frontière EX-3 (CLÔTURE de l'epic EX) : les 5 satellites
  # E5/E6/E11a (`_markdown`/`_geo`/`_intl`/`_export`/`_firestore`) sont désormais
  # AUTORISÉS — la démo exerce Markdown (Quill), Geo (flutter_map OSM), Intl,
  # Export (Syncfusion xlsio/pdf) et l'offline (Hive) via ces satellites, jamais
  # via `zcrud_core` (SM-5).
  #
  # Frontière SU-10 (parcours d'étude assemblé) : `zcrud_session` +
  # `zcrud_flashcard` (E9/étude) sont désormais AUTORISÉS — la démo « Parcours
  # d'étude » assemble le sélecteur → la pile swipeable → la carte interactive →
  # l'écran de célébration à partir de widgets PUBLICS (barrels) + adaptateurs
  # fakes app-side. `zcrud_flashcard` QUITTE donc l'ensemble interdit
  # (basculement de frontière assumé, cf. `test/boundary_deps_test.dart`).
  #
  # ⚠️ `zcrud_study` N'EST PAS ajouté (écart consigné su-10) : son pubspec dépend
  # en DUR de `zcrud_mindmap` ET `zcrud_exam` (vérifié sur disque). L'y ajouter
  # tirerait `zcrud_mindmap` dans le lock de l'app (override path obligatoire) —
  # ce qui VIOLERAIT l'invariant AC10 « `zcrud_mindmap` reste INTERDIT ». Le
  # parcours assemblé (sélecteur→pile→carte→célébration) n'a besoin QUE de
  # `zcrud_session` + `zcrud_flashcard`. Le seul port hébergé par `zcrud_study`
  # (`ZFlashcardGenerationPort`, génération IA) est HORS du flux assemblé ; son
  # fake est reporté. `zcrud_mindmap` (E10) reste INTERDIT (su-12, hors
  # périmètre), prouvé par `test/boundary_deps_test.dart`.
  zcrud_core:
    path: ../packages/zcrud_core
  zcrud_get:
    path: ../packages/zcrud_get
  zcrud_riverpod:
    path: ../packages/zcrud_riverpod
  zcrud_provider:
    path: ../packages/zcrud_provider
  zcrud_list:
    path: ../packages/zcrud_list
  zcrud_markdown:
    path: ../packages/zcrud_markdown
  zcrud_geo:
    path: ../packages/zcrud_geo
  zcrud_intl:
    path: ../packages/zcrud_intl
  zcrud_export:
    path: ../packages/zcrud_export
  zcrud_firestore:
    path: ../packages/zcrud_firestore
  # FP-3.2 (parité totale) — les 4 satellites FORM-PARITY (fp-4/fp-5, tous `done`)
  # sont désormais consommés par la showcase EXHAUSTIVE + le harnais 6 formulaires
  # DODLP : sélection modale riche (`zcrud_select`/`ZSmartSelectPresenter`), média
  # riche (`zcrud_media`), HTML WYSIWYG (`zcrud_html`) et champs spécialisés
  # (`zcrud_field_extras` : pin/autocomplete/editableTable). CONSOMMATEUR only :
  # aucun `packages/*` modifié. AUCUN ne tire `zcrud_mindmap` (vérifié sur disque)
  # — la frontière `test/boundary_deps_test.dart` le prouve (mindmap reste interdit).
  zcrud_select:
    path: ../packages/zcrud_select
  zcrud_html:
    path: ../packages/zcrud_html
  zcrud_media:
    path: ../packages/zcrud_media
  zcrud_field_extras:
    path: ../packages/zcrud_field_extras
  # SU-10 — parcours d'étude assemblé. `zcrud_session` porte le sélecteur, la
  # pile swipeable, la surface de saisie et l'écran de célébration ; il tire
  # `zcrud_flashcard` (carte de révision + ports indice/évaluation + SRS) et
  # `zcrud_study_kernel` (déjà présent). Aucun `zcrud_mindmap`/`zcrud_exam`
  # (cf. l'écart `zcrud_study` documenté plus haut).
  zcrud_session:
    path: ../packages/zcrud_session
  zcrud_flashcard:
    path: ../packages/zcrud_flashcard
  # `zcrud_study_kernel` : transitif (via session/flashcard) mais RÉFÉRENCÉ
  # DIRECTEMENT par le parcours (`ZStudySessionResult`/`ZStudyStreak`, masqués par
  # le barrel `zcrud_flashcard`) ⇒ promu en dépendance directe
  # (`depend_on_referenced_packages`). Barrel PUBLIC, jamais un import `/src/`.
  zcrud_study_kernel:
    path: ../packages/zcrud_study_kernel
  # Transitifs via `zcrud_firestore` mais RÉFÉRENCÉS DIRECTEMENT par l'app
  # (`depend_on_referenced_packages`) : `Hive.initFlutter()` (main.dart, démo
  # offline AC7) et `Hive.init`/`Box` (test hermétique temp-dir). Aucun autre
  # type Hive ne fuit (le port `ZLocalStore` reste neutre). Versions alignées
  # sur `zcrud_firestore` (hive ^2.2.3 / hive_flutter ^1.1.0).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Test-only : la démo LISTE (EX-2) vérifie que le rendu passe par le backend
  # Syncfusion (colonnes dérivées, `SfDataGrid`) tiré via `zcrud_list`. Ce type
  # est transitif ; on le déclare ici pour l'importer explicitement dans le test
  # (`depend_on_referenced_packages`). Runtime : Syncfusion reste tiré via
  # `zcrud_list` (SM-5), jamais `zcrud_core`.
  syncfusion_flutter_datagrid: ^34.1.31

# Icônes Material requises par l'app (AD-13) ET par le backend Syncfusion
# (`zcrud_list`/`SfDataGrid` déclarent `uses-material-design: true`).
flutter:
  uses-material-design: true

# Réconcilie la source path↔hosted des `zcrud_*` (les bindings déclarent
# `zcrud_core: ^0.0.1` hosted). Réservé à l'app isolée ; n'affecte pas les 14.
dependency_overrides:
  zcrud_core:
    path: ../packages/zcrud_core
  zcrud_get:
    path: ../packages/zcrud_get
  zcrud_riverpod:
    path: ../packages/zcrud_riverpod
  zcrud_provider:
    path: ../packages/zcrud_provider
  # `zcrud_list` déclare `resolution: workspace` + épingle `zcrud_core: ^0.0.1`
  # hosted : l'override `path:` réconcilie source path↔hosted (voie standalone
  # EX-1, aucun ajout au `workspace:` racine). Tire Syncfusion dans le lock
  # PROPRE de l'app (jamais dans le lock racine des 14 — SM-5/AD-15).
  zcrud_list:
    path: ../packages/zcrud_list
  # Frontière EX-3 : les 5 satellites déclarent `resolution: workspace` +
  # épinglent `zcrud_core: ^0.2.0` hosted ; l'override `path:` réconcilie source
  # path↔hosted (voie standalone, aucun ajout au `workspace:` racine). Tirent
  # Quill / flutter_map+latlong2 / Syncfusion xlsio+pdf / cloud_firestore+
  # firebase_core+hive dans le lock PROPRE de l'app (jamais le lock racine — SM-5).
  zcrud_markdown:
    path: ../packages/zcrud_markdown
  zcrud_geo:
    path: ../packages/zcrud_geo
  zcrud_intl:
    path: ../packages/zcrud_intl
  zcrud_export:
    path: ../packages/zcrud_export
  zcrud_firestore:
    path: ../packages/zcrud_firestore
  # FP-3.2 : les 4 satellites FORM-PARITY déclarent `resolution: workspace` +
  # épinglent `zcrud_core: ^0.3.3` hosted ; l'override `path:` réconcilie source
  # path↔hosted (voie standalone EX-1, aucun ajout au `workspace:` racine). Ils
  # tirent leurs deps lourdes CONFINÉES (`awesome_select` / `html_editor_enhanced`+
  # `flutter_html` / `image_picker`+`file_picker`… / `pinput`) dans le lock PROPRE
  # de l'app (jamais le lock racine des 14 — SM-5). AUCUN ne tire `zcrud_mindmap`.
  zcrud_select:
    path: ../packages/zcrud_select
  zcrud_html:
    path: ../packages/zcrud_html
  zcrud_media:
    path: ../packages/zcrud_media
  zcrud_field_extras:
    path: ../packages/zcrud_field_extras
  # `awesome_select` : PLUS AUCUN OVERRIDE NÉCESSAIRE (AD-49 révisé, 2026-07-20).
  # Le fork n'est plus vendorisé sous `packages/awesome_select` : `zcrud_select`
  # le déclare directement en DÉPENDANCE GIT (zakarius-dev/awesome_select
  # `ref: v6.1.0`), qui se résout à l'identique depuis le workspace ET depuis une
  # app standalone. C'est précisément ce que l'override path contournait — et ce
  # qu'une app tierce (lex_douane) ne pouvait PAS contourner, faute d'avoir le
  # dossier vendorisé : sa contrainte hosted `^6.0.0` tombait sur la 6.0.0 de
  # pub.dev, figée en Dart 2, et son `pub get` échouait.
  # ES-3.2 : `zcrud_firestore` gagne une arête vers `zcrud_study_kernel` (base
  # offline-first `ZOfflineFirstBoxRepository` étendant `ZStudyRepository`, ES-3.1).
  # Override CONSOMMATEUR path↔hosted (voie standalone EX-1, aucun ajout au
  # `workspace:` racine) — sinon la dép transitive `^0.2.0` est cherchée sur pub.dev.
  zcrud_study_kernel:
    path: ../packages/zcrud_study_kernel
  # Transitif de `zcrud_study_kernel` (annotations `const` du codegen) : override
  # path↔hosted pour la même raison (voie standalone EX-1).
  zcrud_annotations:
    path: ../packages/zcrud_annotations
  # EX-UI.11 : `zcrud_get` gagne 2 arêtes (`ZGetFormPresenter`/`ZGetToaster`
  # implémentent les ports de `zcrud_navigation`/`zcrud_ui_kit`). Overrides
  # CONSOMMATEUR path↔hosted (voie standalone EX-1, aucun ajout au `workspace:`
  # racine) — sinon ces dép. transitives `^0.2.0` sont cherchées sur pub.dev.
  # `zcrud_responsive` (transitif de `zcrud_navigation`) est aussi épinglé.
  zcrud_navigation:
    path: ../packages/zcrud_navigation
  zcrud_ui_kit:
    path: ../packages/zcrud_ui_kit
  zcrud_responsive:
    path: ../packages/zcrud_responsive
  # SU-10 — parcours d'étude. `zcrud_session`/`zcrud_flashcard` déclarent
  # `resolution: workspace` + épinglent `zcrud_core: ^0.3.3` hosted : l'override
  # `path:` réconcilie source path↔hosted (voie standalone EX-1, aucun ajout au
  # `workspace:` racine). Ils tirent `flutter_card_swiper`/`confetti`/Quill dans
  # le lock PROPRE de l'app (jamais le lock racine — SM-5). Leur unique arête
  # zcrud transitive nouvelle (`zcrud_ui_kit`) est déjà surchargée ci-dessus ;
  # AUCUN `zcrud_mindmap`/`zcrud_exam` (cf. écart `zcrud_study`).
  zcrud_session:
    path: ../packages/zcrud_session
  zcrud_flashcard:
    path: ../packages/zcrud_flashcard
