# Root du workspace zcrud (pub workspaces — resolution: workspace).
# Source de vérité de la résolution partagée : un unique pubspec.lock racine.
# Les 14 packages PRODUIT sont listés ci-dessous (ordre = Structural Seed AD-1),
# suivis du harnais dev/test-only `binding_conformance` (E2-9, hors packages/**).
name: zcrud_workspace
publish_to: none

environment:
  sdk: ^3.12.2

# Bloc workspace natif de pub (Dart >= 3.5) : chaque membre déclare
# `resolution: workspace` dans son propre pubspec.yaml.
workspace:
  - packages/zcrud_core
  - packages/zcrud_annotations
  - packages/zcrud_generator
  - packages/zcrud_markdown
  - packages/zcrud_list
  - packages/zcrud_mindmap
  - packages/zcrud_flashcard
  - packages/zcrud_firestore
  - packages/zcrud_geo
  - packages/zcrud_intl
  - packages/zcrud_export
  - packages/zcrud_riverpod
  - packages/zcrud_get
  - packages/zcrud_provider
  # Harnais de parité E2-9 : dev/test-only, HORS du glob melos `packages/**`
  # (donc `melos list` reste 14) mais membre du workspace pour une résolution
  # partagée propre. Nom sans préfixe `zcrud_` → invisible pour graph_proof.py
  # (CORE OUT=0 / ACYCLIQUE inchangés). Référencé en dev_dependency des 3 bindings.
  - tool/binding_conformance

dev_dependencies:
  melos: ^7.0.0
  # Baseline de lint pur-Dart partagée (analysis_options.yaml racine). Déclarée
  # une seule fois au root (package_config partagé sous pub workspaces) =>
  # `package:lints/recommended.yaml` résolvable depuis chaque membre pur-Dart.
  lints: ^5.0.0
  # Résolution garantie de `package:yaml` pour le gate M-1 (scripts/ci/gate_melos_divergence.dart).
  yaml: ^3.1.2

# Configuration melos (melos >= 6 / pub workspaces la lit depuis le root
# pubspec.yaml). ⚠️ CE BLOC EST LA SOURCE DE VÉRITÉ DES SCRIPTS melos : le
# `melos.yaml` racine en contient une copie identique (conservée pour AC 3)
# qui est IGNORÉE par melos sous pub workspaces. Toute évolution de script se
# fait ICI en priorité. Garde-fou CI anti-divergence => gate M-1 (gate:melos).
# ⚠️ M-1 : ce bloc `scripts:` DOIT rester identique à celui de `melos.yaml`
# (le gate `gate:melos` échoue sinon).
melos:
  name: zcrud
  # E2-9 : exclut le harnais dev/test-only `binding_conformance` (membre du
  # workspace pub pour une résolution partagée propre, mais NON produit) de la
  # VUE melos → `melos list` reste 14 (invariant produit). N'affecte PAS les
  # scripts (gate M-1 ne compare que le bloc `scripts:`).
  ignore:
    - binding_conformance
  scripts:
    generate:
      description: Régénère le code (build_runner) sur chaque package annoté (no-op propre si aucun).
      run: melos exec --depends-on build_runner -- dart run build_runner build --delete-conflicting-outputs
    analyze:
      description: Analyse statique de tous les packages.
      exec: dart analyze .
    test:dart:
      description: Tests des packages PUR-DART (dart test ; exclut les packages Flutter).
      run: melos exec --no-flutter --dir-exists test -- dart test
    test:flutter:
      description: Tests des packages FLUTTER (flutter test ; ex. zcrud_core depuis E2-7).
      run: melos exec --flutter --dir-exists test -- flutter test
    test:
      description: Agrège les tests pur-Dart puis Flutter (route zcrud_core vers flutter test).
      run: melos run test:dart && melos run test:flutter
    gate:graph:
      description: "Gate AD-1 : acyclicité du graphe de dépendances (deps + dev + overrides)."
      run: python3 scripts/dev/graph_proof.py
    gate:melos:
      description: "Gate M-1 : anti-divergence des blocs scripts melos (pubspec vs melos.yaml)."
      run: dart run scripts/ci/gate_melos_divergence.dart
    gate:reflectable:
      description: "Gate AD-3 : interdiction de reflectable dans le moteur (hors ReflectableCodec)."
      run: dart run scripts/ci/gate_reflectable.dart
    gate:secrets:
      description: "Gate AD-12 : scan de secrets committés (repli local)."
      run: dart run scripts/ci/gate_secret_scan.dart
    gate:codegen:
      description: "Gate AD-3 : aucun modèle annoté sans .g.dart généré."
      run: dart run scripts/ci/gate_codegen.dart
    gate:compat:
      description: "Gate FR-25 (E1-4) : dry-run de compat de résolution (flutter_quill+awesome_select+analyzer) dans tool/compat_check. Exige la toolchain Flutter."
      run: dart run scripts/ci/gate_compat_resolution.dart
    verify:serialization:
      description: "Slot E2-10 (AD-10) : rétro-compat de sérialisation. No-op documenté jusqu'à E2-10."
      run: dart run scripts/ci/verify_serialization.dart
    verify:
      description: "Enchaîne tous les gates de merge localement (miroir de la CI)."
      run: |
        python3 scripts/dev/graph_proof.py && \
        dart run scripts/ci/gate_melos_divergence.dart && \
        dart run scripts/ci/gate_reflectable.dart && \
        dart run scripts/ci/gate_secret_scan.dart && \
        dart run scripts/ci/gate_codegen.dart && \
        dart run scripts/ci/gate_compat_resolution.dart && \
        dart run scripts/ci/verify_serialization.dart
