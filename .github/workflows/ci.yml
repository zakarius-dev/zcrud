# CI zcrud (E1-3, SM-6 ; refondue en ES-1.4) — gates de merge de qualité &
# d'architecture.
#
# Ordre IMPOSÉ (CLAUDE.md, AC 3) : setup toolchain (Flutter + **Node**) →
# résolution → CODEGEN → ANALYZE → TEST → GATES. Le codegen précède analyze/test
# (le généré est gitignoré et régénéré). Toute violation fait échouer le merge.
#
# ## ⚠️ LES GATES SONT EXÉCUTÉS PAR UN STEP UNIQUE : `melos run verify`
#
# Jusqu'à ES-1.4, ce workflow RE-LISTAIT les gates un par un — même classe de
# dérive que celle que combat `gate:melos` (M-1). Le symptôme a été avéré :
# `gate:web`, ajouté à `verify` en ES-1.2, n'a JAMAIS tourné en CI (il n'était
# pas dans cette liste), et Node n'était même pas installé. **Faux vert pendant
# toute une story.**
#
# Désormais : la CI appelle `dart run melos run verify` — l'agrégat défini dans
# `pubspec.yaml` (`melos.scripts.verify`, miroir `melos.yaml`). Tout gate ajouté
# à `verify` est en CI **PAR CONSTRUCTION** ; la dérive « gate dans verify mais
# pas dans ci.yml » est structurellement IMPOSSIBLE. Ne JAMAIS réintroduire une
# liste de gates ici.
#
# Restent des steps SÉPARÉS, car hors `verify` (CI-only par nature) :
#   - `gitleaks` : autorité du scan de secrets sur l'HISTORIQUE git ;
#   - `prove_gates.dart` : preuve « échoue sur violation, passe sinon » (fixtures).
#
# Runner : subosito/flutter-action (pérennité E3+ ; tant que Dart résolu = ^3.12.2).
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: codegen -> analyze -> test -> gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet pour le scan de secrets)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter (fournit Dart ^3.12.2)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      # ES-1.4 — SANS Node, `gate:web` (dart test -p node) SKIPPE : le
      # déterminisme web (vecteurs golden FNV-1a de zFnv1a32, cassés en JS par la
      # variante naïve) n'était en fait JAMAIS vérifié en CI depuis ES-1.2.
      # Ce step est ce qui rend `gate:web` réellement exécutoire.
      - name: Setup Node (rend gate:web réellement exécutable — dart test -p node)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Résolution workspace (pub workspaces)
        run: dart pub get

      # ---- CODEGEN (avant analyze/test/gates) ----
      # `gate:codegen` ET `gate:reserved-keys` LISENT les *.g.dart (gitignorés).
      - name: Codegen (melos run generate)
        run: dart run melos run generate

      # ---- ANALYZE ----
      - name: Analyze (melos run analyze)
        run: dart run melos run analyze

      # ---- TEST ----
      # `melos run test` = test:dart (--no-flutter → dart test) puis test:flutter
      # (--flutter → flutter test). Depuis E2-7, zcrud_core est un package Flutter
      # et route vers `flutter test` ; la toolchain Flutter est déjà installée.
      # ⚠️ Les harnais `tool/*` sont dans `melos.ignore` : leurs tests ne tournent
      # PAS ici — `gate:reserved-keys` (dans `verify`) lance explicitement celui
      # de `tool/reserved_keys_gate`.
      - name: Test (melos run test)
        run: dart run melos run test

      # ---- GATES d'architecture : STEP UNIQUE (anti-dérive, ES-1.4) ----
      # graph (AD-1) · melos M-1 · reflectable (AD-3) · secrets (AD-12) ·
      # codegen (AD-3) · compat (FR-25) · web (ES-1.2/M1) ·
      # reserved-keys (AD-19.1) · verify:serialization (AD-10).
      - name: Gates d'architecture (melos run verify — miroir exact du local)
        run: dart run melos run verify

      # gitleaks = AUTORITÉ CI du scan de secrets (couvre l'HISTORIQUE git, ce que
      # le repli Dart de `verify` ne peut pas faire). Config : .gitleaks.toml.
      - name: Gate AD-12 — gitleaks (autorité, historique git)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

      # ---- Preuve reproductible des gates (fixtures éphémères, AC 10) ----
      # « Un gate qu'on n'a pas vu échouer n'est pas un gate. »
      - name: Preuve « échoue sur violation, passe sinon » (gates + compat + reserved-keys)
        run: dart run scripts/ci/prove_gates.dart
