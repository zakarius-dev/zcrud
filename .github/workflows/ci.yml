# CI zcrud (E1-3, SM-6) — gates de merge de qualité & d'architecture.
#
# Ordre IMPOSÉ (CLAUDE.md, AC 3) : setup toolchain → résolution → CODEGEN →
# ANALYZE → TEST → GATES (anti-reflectable AD-3, secrets AD-12, codegen AD-3,
# acyclicité AD-1, anti-divergence melos M-1) → SLOT rétro-compat sérialisation
# (E2-10, AD-10). Le codegen précède analyze/test (le généré est gitignoré et
# régénéré). Toute violation fait échouer le merge.
#
# Runner : subosito/flutter-action (pérennité E3+ ; tant que Dart résolu = ^3.12.2).
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: codegen -> analyze -> test -> gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet pour le scan de secrets)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter (fournit Dart ^3.12.2)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - name: Résolution workspace (pub workspaces)
        run: dart pub get

      # ---- CODEGEN (avant analyze/test) ----
      - name: Codegen (melos run generate)
        run: dart run melos run generate

      # ---- ANALYZE ----
      - name: Analyze (melos run analyze)
        run: dart run melos run analyze

      # ---- TEST ----
      # `melos run test` = test:dart (--no-flutter → dart test) puis test:flutter
      # (--flutter → flutter test). Depuis E2-7, zcrud_core est un package Flutter
      # et route vers `flutter test` ; la toolchain Flutter est déjà installée
      # (subosito ci-dessus) → aucun setup supplémentaire requis.
      - name: Test (melos run test)
        run: dart run melos run test

      # ---- GATES d'architecture ----
      - name: Gate AD-1 — acyclicité (graph_proof durci, dev_deps + overrides)
        run: python3 scripts/dev/graph_proof.py

      - name: Gate M-1 — anti-divergence des blocs scripts melos
        run: dart run scripts/ci/gate_melos_divergence.dart

      - name: Gate AD-3 — anti-reflectable (moteur, hors ReflectableCodec)
        run: dart run scripts/ci/gate_reflectable.dart

      - name: Gate AD-12 — scan de secrets (repli local reproductible)
        run: dart run scripts/ci/gate_secret_scan.dart

      # gitleaks = AUTORITÉ CI du scan de secrets (couvre l'historique git).
      # Config/allowlist : .gitleaks.toml. Le repli Dart ci-dessus prouve le gate
      # localement (hors réseau) et sert les fixtures.
      - name: Gate AD-12 — gitleaks (autorité, historique git)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Gate AD-3 — contrôle codegen (aucun modèle annoté sans .g.dart)
        run: dart run scripts/ci/gate_codegen.dart

      # ---- Gate FR-25 (E1-4) : compat de résolution (voie manifeste, BLOQUANTE) ----
      # Dry-run de résolution du triplet flutter_quill+awesome_select+analyzer dans
      # le package ISOLÉ tool/compat_check (hors des 14 membres pur-Dart, hors du
      # graphe AD-1). Flutter est déjà installé (subosito) => dry-run exécutable.
      # La voie « workspace lex_douane réel » est informationnelle : LEX_WORKSPACE
      # n'est pas fourni en CI => SKIP propre (le gate reste vert).
      - name: Gate FR-25 — compat de résolution (voie manifeste, bloquant)
        run: dart run scripts/ci/gate_compat_resolution.dart

      # ---- Preuve reproductible des gates (fixtures éphémères, AC 10) ----
      - name: Preuve « échoue sur violation, passe sinon » (gates + compat FR-25)
        run: dart run scripts/ci/prove_gates.dart

      # ---- SLOT E2-10 : rétro-compat de sérialisation (AD-10) ----
      # Rattaché au gate de merge en E1-3. NO-OP vert aujourd'hui ; E2-10
      # fournira les tests taggés `serialization-compat` SANS toucher ce workflow
      # (le slot les auto-découvre via scripts/ci/verify_serialization.dart).
      - name: Slot rétro-compat sérialisation (E2-10, no-op documenté)
        run: dart run melos run verify:serialization
